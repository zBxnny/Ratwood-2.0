      have re-found their way to the Vale. Bikini lovers rejoice!
  john-pawson:
  - rscadd: Added portable alchemy stations and cauldrons! The cauldron can only hold
      60 drams, so you won't be able to make full potion batches with it.
  - rscadd: The portable alchemy station and the portable cauldron can be bought at
      the merchant or made by an artificer.
